version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: trend-ai-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trend-ai-backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - backend-venv:/app/venv
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trend-ai-frontend
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - PORT=3001
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  backend-venv:
  redis-data:
